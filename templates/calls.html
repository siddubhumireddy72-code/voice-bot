{% extends "base.html" %}

{% block title %}Calls - Voice Bot{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>📞 Call Logs</h1>
        <p class="text-muted">View all incoming and outgoing calls</p>
    </div>
</div>

<!-- Filters -->
<div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <form id="filter-form" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Caller Number</label>
                        <input type="text" id="caller-filter" class="form-control" placeholder="Filter by caller...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Status</label>
                        <select id="status-filter" class="form-select">
                            <option value="">All Statuses</option>
                            <option value="answered">Answered</option>
                            <option value="missed">Missed</option>
                            <option value="pending">Pending</option>
                            <option value="ended">Ended</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Date Range</label>
                        <input type="date" id="date-filter" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">&nbsp;</label>
                        <button type="button" class="btn btn-primary w-100" onclick="filterCalls()">Filter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Calls Table -->
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h5>All Calls</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Caller</th>
                                <th>Receiver</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Type</th>
                                <th>Started</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="calls-table-body">
                            <tr>
                                <td colspan="8" class="text-center text-muted">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Call Details Modal -->
<div class="modal fade" id="callModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Call Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="call-details-body">
                Loading...
            </div>
        </div>
    </div>
</div>

<script>
    function loadCalls() {
        fetch('/api/calls')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    const table = document.getElementById('calls-table-body');
                    table.innerHTML = '';
                    data.calls.forEach(call => {
                        const statusBadge = `<span class="badge bg-${call.status === 'answered' ? 'success' : call.status === 'missed' ? 'danger' : 'warning'}">${call.status}</span>`;
                        const row = `
                            <tr>
                                <td>${call.id}</td>
                                <td>${call.caller_number}</td>
                                <td>${call.receiver_number || 'N/A'}</td>
                                <td>${call.duration}s</td>
                                <td>${statusBadge}</td>
                                <td>${call.call_type}</td>
                                <td>${new Date(call.started_at).toLocaleString()}</td>
                                <td>
                                    <button class="btn btn-sm btn-info" onclick="viewCall(${call.id})">View</button>
                                </td>
                            </tr>
                        `;
                        table.innerHTML += row;
                    });
                }
            });
    }

    function viewCall(callId) {
        fetch(`/api/calls/${callId}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    const call = data.call;
                    const html = `
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Caller:</strong> ${call.caller_number}</p>
                                <p><strong>Receiver:</strong> ${call.receiver_number || 'N/A'}</p>
                                <p><strong>Duration:</strong> ${call.duration}s</p>
                                <p><strong>Status:</strong> <span class="badge bg-${call.status === 'answered' ? 'success' : 'danger'}">${call.status}</span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Type:</strong> ${call.call_type}</p>
                                <p><strong>Started:</strong> ${new Date(call.started_at).toLocaleString()}</p>
                                <p><strong>Ended:</strong> ${call.ended_at ? new Date(call.ended_at).toLocaleString() : 'N/A'}</p>
                                <p><strong>Created:</strong> ${new Date(call.created_at).toLocaleString()}</p>
                            </div>
                        </div>
                        <hr>
                        <h6>Transcript</h6>
                        <p>${call.transcript || 'No transcript available'}</p>
                        <hr>
                        <h6>Bot Response</h6>
                        <p>${call.bot_response || 'No response recorded'}</p>
                    `;
                    document.getElementById('call-details-body').innerHTML = html;
                    new bootstrap.Modal(document.getElementById('callModal')).show();
                }
            });
    }

    function filterCalls() {
        // Filter implementation
        alert('Filter functionality coming soon!');
    }

    // Load calls on page load
    document.addEventListener('DOMContentLoaded', loadCalls);
</script>
{% endblock %}
